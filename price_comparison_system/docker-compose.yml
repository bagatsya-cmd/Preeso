version: '3.9'

services:
  # ── MongoDB ─────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: comparex_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: pricecompare
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: comparex_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Backend ──────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: comparex_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV:     production
      PORT:         5000
      MONGO_URI:    mongodb://mongodb:27017/pricecompare
      REDIS_URL:    redis://redis:6379
      FRONTEND_URL: http://127.0.0.1:3000
      JWT_SECRET:   ${JWT_SECRET:-change_me_in_production}
      EMAIL_USER:   ${EMAIL_USER:-}
      EMAIL_PASS:   ${EMAIL_PASS:-}
      LOG_LEVEL:    info
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # Puppeteer needs these shared memory settings
    shm_size: '1gb'

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: comparex_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV:               production
      NEXT_PUBLIC_API_URL:    http://backend:5000
      NEXT_PUBLIC_SITE_NAME:  CompareX
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  mongo_data:
    driver: local
  redis_data:
    driver: local

networks:
  default:
    name: comparex_net